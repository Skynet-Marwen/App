map $http_cf_connecting_ip $skynet_client_ip {
    default $http_cf_connecting_ip;
    "" $remote_addr;
}

map $http_x_forwarded_for $skynet_forwarded_for {
    default "$http_x_forwarded_for, $skynet_client_ip";
    "" $skynet_client_ip;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: redirect all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend
    location /api/v1/stats/realtime/ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $skynet_client_ip;
        proxy_set_header X-Real-IP $skynet_client_ip;
        proxy_set_header X-Forwarded-For $skynet_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $skynet_client_ip;
        proxy_set_header X-Real-IP $skynet_client_ip;
        proxy_set_header X-Forwarded-For $skynet_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # .mmdb upload — GeoLite2-City is ~70 MB
    location /api/v1/settings/geoip/upload {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $skynet_client_ip;
        proxy_set_header X-Real-IP $skynet_client_ip;
        proxy_set_header X-Forwarded-For $skynet_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 150m;
        proxy_read_timeout 120s;
    }

    # Adblock same-origin bait probe — must return 200 JS so only ad blockers block it
    location = /ads.js {
        proxy_pass http://backend:8000/api/v1/track/ads.js;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $skynet_client_ip;
        proxy_set_header X-Forwarded-For $skynet_forwarded_for;
    }

    # Proxy tracker script and blocker-resistant tracker aliases
    location /tracker/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $skynet_client_ip;
        proxy_set_header X-Real-IP $skynet_client_ip;
        proxy_set_header X-Forwarded-For $skynet_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /s/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $skynet_client_ip;
        proxy_set_header X-Real-IP $skynet_client_ip;
        proxy_set_header X-Forwarded-For $skynet_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /w/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $skynet_client_ip;
        proxy_set_header X-Real-IP $skynet_client_ip;
        proxy_set_header X-Forwarded-For $skynet_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy uploaded theme assets such as logos
    location /theme-assets/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $skynet_client_ip;
        proxy_set_header X-Real-IP $skynet_client_ip;
        proxy_set_header X-Forwarded-For $skynet_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend utility routes used in direct and tunneled deployments
    location = /docs {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $skynet_client_ip;
        proxy_set_header X-Real-IP $skynet_client_ip;
        proxy_set_header X-Forwarded-For $skynet_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $skynet_client_ip;
        proxy_set_header X-Real-IP $skynet_client_ip;
        proxy_set_header X-Forwarded-For $skynet_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /redoc {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $skynet_client_ip;
        proxy_set_header X-Real-IP $skynet_client_ip;
        proxy_set_header X-Forwarded-For $skynet_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $skynet_client_ip;
        proxy_set_header X-Real-IP $skynet_client_ip;
        proxy_set_header X-Forwarded-For $skynet_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header CF-Connecting-IP $skynet_client_ip;
        proxy_set_header X-Real-IP $skynet_client_ip;
        proxy_set_header X-Forwarded-For $skynet_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
