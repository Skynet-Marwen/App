version: "3.9"

# Development override — start dependencies only, run app locally
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: skynet
      POSTGRES_USER: skynet
      POSTGRES_PASSWORD: skynet_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skynet"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional: Adminer — DB GUI at http://localhost:8888
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8888:8080"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

  # Optional: RedisInsight — Redis GUI at http://localhost:5540
  redisinsight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    ports:
      - "5540:5540"
    profiles:
      - tools

volumes:
  postgres_dev_data:
  redis_dev_data:
